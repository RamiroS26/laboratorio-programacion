<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Sistemas Informáticos</title>
    <link rel="stylesheet" href="sistemas.css">
    <script src="sistemas.js" defer></script>
</head>
<body>
<form id="sistemasForm" onsubmit="validarSistema(event)">
    <h2>Alta de Sistema Informático</h2>

    <label for="sysId">ID Sistema (Máx 5 dígitos):</label>
    <input type="number" id="sysId" max="99999" required>

    <label for="sysNombre">Nombre del Sistema:</label>
    <input type="text" id="sysNombre" maxlength="50" required>

    <label for="sysAutor">Autor:</label>
    <input type="text" id="sysAutor" maxlength="40" required>

    <label for="sysDesc">Descripción:</label>
    <textarea id="sysDesc" maxlength="100" rows="3" required></textarea>

    <label for="sysAno">Año:</label>
    <input type="number" id="sysAno" min="1950" max="2030" required>

    <label for="oficinaId">Oficina Asignada (ID):</label>
    <input type="number" id="oficinaId" required>

    <button type="submit">Guardar Sistema</button>
</form>
</body>
</html>
