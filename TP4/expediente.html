<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Expedientes</title>
    <link rel="stylesheet" href="expediente.css">
    <script src="expediente.js" defer></script>
</head>
<body>
<form id="expedienteForm">
    <h2>Datos del Expediente</h2>

    <label>Número de expediente (4 dígitos):</label>
    <input type="text" id="nroExpediente" placeholder="Ej: 1234" maxlength="4">
    <div id="errExpediente" class="error">Debe contener exactamente 4 dígitos.</div>

    <label>Área:</label>
    <select id="area">
        <option value="Mesa de Entrada">Mesa de Entrada</option>
        <option value="Jurídico">Jurídico</option>
        <option value="Informática">Informática</option>
        <option value="Administración">Administración</option>
    </select>

    <label>Tipo de trámite:</label>
    <select id="tipoTramite" onchange="mostrarAlertaTramite()">
        <option value="">Seleccione...</option>
        <option value="Urgente">Urgente</option>
        <option value="Normal">Normal</option>
        <option value="Bajo">Bajo</option>
    </select>

    <h2>Datos de Gestión</h2>

    <label>Cantidad de días en trámite:</label>
    <input type="number" id="diasTramite" min="1">
    <div id="errDias" class="error">Debe ser mayor a 0.</div>

    <label>Estado:</label>
    <div class="radios">
        <input type="radio" name="estado" value="Pendiente"> Pendiente
        <input type="radio" name="estado" value="En proceso"> En proceso
        <input type="radio" name="estado" value="Finalizado"> Finalizado
    </div>
    <div id="errEstado" class="error">Debe seleccionar un estado.</div>

    <label>Responsable:</label>
    <input type="text" id="responsable" oninput="validarResponsable(this)">
    <div id="errResponsable" class="error">Solo letras permitidas.</div>

    <label>Cantidad de expedientes gestionados hoy:</label>
    <input type="number" id="expHoy" min="0">
    <div id="errExpHoy" class="error">Campo obligatorio.</div>

    <label>Horas trabajadas (1 a 12):</label>
    <input type="number" id="horasTrabajadas" min="1" max="12">
    <div id="errHoras" class="error">Debe ser entre 1 y 12.</div>

    <div class="botones">
        <button type="button" onclick="validarFormulario()">Validar</button>
        <button type="reset" onclick="ocultarErrores()">Limpiar</button>
        <button type="button" onclick="calcularEstadistica()">Estadística</button>
        <button type="button" onclick="generarJSON()">JSON</button>
    </div>
</form>

<div id="resultado-estadistica"></div>
<div id="resultado-json">
    <h4>JSON:</h4>
    <pre id="jsonOutput"></pre>
</div>
</body>
</html>
